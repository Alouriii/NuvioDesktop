name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.configuration-cache=false"
  JAVA_VERSION: "17"

# ─────────────────────────────────────────────────────────────
# Android (full + playstore flavors)
# ─────────────────────────────────────────────────────────────
jobs:
  build-android:
    name: Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Decode Keystore
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.keystore

      - name: Build Android APKs
        run: ./gradlew :composeApp:assembleFullRelease :composeApp:assemblePlaystoreRelease
        env:
          # Runtime config
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          TRAKT_REDIRECT_URI: ${{ secrets.TRAKT_REDIRECT_URI }}
          INTRODB_API_URL: ${{ secrets.INTRODB_API_URL }}
          CONTRIBUTIONS_URL: ${{ secrets.CONTRIBUTIONS_URL }}
          DONATIONS_BASE_URL: ${{ secrets.DONATIONS_BASE_URL }}
          # Android signing (skipped on PRs — keystore not decoded)
          RELEASE_KEYSTORE: ${{ github.event_name != 'pull_request' && format('{0}/release.keystore', github.workspace) || '' }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            composeApp/build/outputs/apk/full/release/*.apk
            composeApp/build/outputs/apk/playstore/release/*.apk
          if-no-files-found: error

# ─────────────────────────────────────────────────────────────
# Desktop — Windows (EXE + MSI + portable ZIP)
# ─────────────────────────────────────────────────────────────
  build-desktop-windows:
    name: Desktop (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Windows packages
        shell: bash
        run: ./gradlew :composeApp:packageReleaseExe :composeApp:packageReleaseMsi :composeApp:packageWindowsPortable
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          TRAKT_REDIRECT_URI: ${{ secrets.TRAKT_REDIRECT_URI }}
          INTRODB_API_URL: ${{ secrets.INTRODB_API_URL }}
          CONTRIBUTIONS_URL: ${{ secrets.CONTRIBUTIONS_URL }}
          DONATIONS_BASE_URL: ${{ secrets.DONATIONS_BASE_URL }}

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            composeApp/build/compose/binaries/main-release/exe/*.exe
            composeApp/build/compose/binaries/main-release/msi/*.msi
            composeApp/build/distributions/Nuvio-*-portable.zip
          if-no-files-found: error

# ─────────────────────────────────────────────────────────────
# Desktop — macOS (DMG)
# ─────────────────────────────────────────────────────────────
  build-desktop-macos:
    name: Desktop (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build macOS DMG
        run: ./gradlew :composeApp:packageReleaseDmg
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          TRAKT_REDIRECT_URI: ${{ secrets.TRAKT_REDIRECT_URI }}
          INTRODB_API_URL: ${{ secrets.INTRODB_API_URL }}
          CONTRIBUTIONS_URL: ${{ secrets.CONTRIBUTIONS_URL }}
          DONATIONS_BASE_URL: ${{ secrets.DONATIONS_BASE_URL }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: composeApp/build/compose/binaries/main-release/dmg/*.dmg
          if-no-files-found: error

# ─────────────────────────────────────────────────────────────
# Release — attach all artifacts to the GitHub Release
# ─────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-android, build-desktop-windows, build-desktop-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
